<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#e5e7eb"/>
  <g transform="translate(200, 150)">
    <!-- House shape -->
    <path d="M-60,-20 L0,-60 L60,-20 L60,40 L-60,40 Z" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
    <!-- Door -->
    <rect x="-15" y="5" width="30" height="35" fill="#92400e" stroke="#78350f" stroke-width="1"/>
    <!-- Windows -->
    <rect x="-40" y="-10" width="20" height="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <rect x="20" y="-10" width="20" height="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <!-- Roof -->
    <path d="M-80,-20 L0,-80 L80,-20" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
    <!-- Text -->
    <text x="0" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Image non disponible</text>
  </g>
</svg>
